<!DOCTYPE html>

            background-attachment: fixed;
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #333;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            border: 4px solid #4b0082;
        }

        h1 {
            font-size: 28px; /* Slightly reduced to fit the new longer title */
            margin: 0 0 10px 0;
            color: #4b0082;
            text-shadow: 1px 1px #ff6347;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            padding: 10px 20px;
            background-color: #FF6347;
            color: white;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .btn-back:hover {
            transform: scale(1.05);
            background-color: #e55337;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .class-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-top: 5px solid #4b0082;
        }

        .class-title {
            font-size: 18px; /* Reduced slightly */
            color: #4b0082;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 5px; /* Reduced padding to fit 10 rows nicely */
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 12px; /* Smaller font for the list */
        }

        th {
            background-color: #f471b5;
            color: white;
            padding: 8px 5px; /* Keep header a bit taller */
        }

        td.nama-murid {
            text-align: left;
            text-transform: capitalize;
            font-weight: bold;
            font-size: 12px; /* Smaller font */
        }

        .rank-1 { background-color: #ffd700; font-weight: bold; } /* Gold */
        .rank-2 { background-color: #c0c0c0; font-weight: bold; } /* Silver */
        .rank-3 { background-color: #cd7f32; font-weight: bold; } /* Bronze */
        .rank-other { background-color: transparent; } /* Normal rows */

        .credit {
            text-align: center;
            margin-top: 40px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
